<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>あいらぼ＊ — News デモ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans JP', sans-serif; background: #f9f9f9; color: #1e1e1e; }

header {
  background: #f9f9f9; border-bottom: 1px solid #d9d9d9;
  height: 64px; display: flex; align-items: center;
  padding: 0 32px; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.logo { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 20px; color: #1e6b86; }
nav { display: flex; gap: 16px; align-items: center; }
nav a { font-size: 14px; color: #757575; text-decoration: none; font-family: 'Space Grotesk', sans-serif; }
nav a.active { color: #1e6b86; font-weight: 700; }
nav span { color: #d9d9d9; font-size: 12px; }

.demo-banner {
  background: linear-gradient(135deg, #1e6b86, #2a8fad);
  color: white; text-align: center; padding: 10px 24px;
  font-size: 13px; display: flex; align-items: center; justify-content: center; gap: 10px;
}
.badge {
  background: rgba(255,255,255,0.2); border-radius: 20px;
  padding: 2px 10px; font-weight: 700; font-size: 11px; letter-spacing: 0.5px;
}

.section { max-width: 960px; margin: 60px auto; padding: 0 24px; }
.section-title {
  font-family: 'Space Grotesk', sans-serif; font-size: 36px;
  font-weight: 700; color: #1e6b86; margin-bottom: 24px;
}

/* STATUS */
.status-bar {
  display: flex; align-items: center; gap: 10px; font-size: 12px; color: #555;
  margin-bottom: 16px; padding: 8px 14px; background: #eef7fa;
  border-radius: 6px; border: 1px solid #c8e8f0;
}
.dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; flex-shrink: 0; transition: background .3s; }
.dot.loading { background: #f59e0b; animation: pulse 1s infinite; }
.dot.ok { background: #22c55e; }
.dot.error { background: #ef4444; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }
.reload-btn {
  margin-left: auto; padding: 4px 12px; font-size: 12px;
  border: 1px solid #1e6b86; border-radius: 4px; color: #1e6b86;
  background: white; cursor: pointer; font-family: inherit;
}
.reload-btn:hover { background: #1e6b86; color: white; }

/* TABS */
.tabs { display: flex; gap: 6px; border-bottom: 1px solid #1e1e1e; margin-bottom: 0; }
.tab {
  padding: 10px 20px; font-size: 14px; cursor: pointer;
  border: 1px solid #8c8c8c; border-bottom: none;
  border-radius: 4px 4px 0 0; background: white; color: #1e1e1e;
  position: relative; bottom: -1px; font-family: inherit; transition: all .15s;
}
.tab.active { background: #1e6b86; color: white; border-color: #1e6b86; }
.tab:hover:not(.active) { background: #f0f0f0; }

/* NEWS ITEMS */
.news-item {
  display: flex; align-items: center; gap: 16px;
  padding: 18px 24px; border-bottom: 1px solid #8c8c8c;
  text-decoration: none; color: inherit; transition: background .1s;
}
.news-item:hover { background: #f0f7fa; cursor: pointer; }
.news-date { font-size: 15px; white-space: nowrap; min-width: 100px; }
.news-cat {
  font-size: 13px; padding: 5px 14px; border: 1px solid #8c8c8c;
  border-radius: 4px; white-space: nowrap; min-width: 110px;
  text-align: center; background: white;
}
.cat-イベント { border-color: #1e6b86; color: #1e6b86; }
.cat-メディア掲載 { border-color: #2e7d32; color: #2e7d32; }
.cat-お知らせ { border-color: #b45309; color: #b45309; }
.news-title { flex: 1; font-size: 15px; color: #757575; }
.news-arrow { color: #757575; font-size: 20px; }

.empty { text-align: center; padding: 48px; color: #757575; border-bottom: 1px solid #d9d9d9; }

.btn-wrap { display: flex; justify-content: center; margin-top: 40px; }
.btn-primary {
  display: flex; align-items: center; gap: 6px;
  background: #1e6b86; color: white; border: none; border-radius: 8px;
  padding: 14px 28px; font-size: 15px; font-weight: 700; cursor: pointer;
  font-family: inherit; transition: background .15s;
}
.btn-primary:hover { background: #165a72; }

footer { text-align: center; font-size: 12px; color: #aaa; margin-top: 80px; padding: 24px; border-top: 1px solid #eee; }
</style>
</head>
<body>

<header>
  <div class="logo">ailab＊</div>
  <nav>
    <a href="#">About</a><span>／</span>
    <a href="#">Projects</a><span>／</span>
    <a href="#">Gallery</a><span>／</span>
    <a href="#news" class="active">News</a><span>／</span>
    <a href="#">Contact</a>
  </nav>
</header>

<div class="demo-banner">
  <span class="badge">🔴 LIVE DEMO</span>
  <span>Notionを更新 → 「再取得」ボタンを押すだけで即反映！報告会デモ用ページ</span>
</div>

<div class="section" id="news">
  <div class="section-title">News</div>

  <div class="status-bar" id="status-bar">
    <div class="dot" id="dot"></div>
    <span id="status-text">読み込み中...</span>
    <button class="reload-btn" onclick="load()">↺ 再取得</button>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="filter('all',this)">すべて</button>
    <button class="tab" onclick="filter('イベント',this)">イベント</button>
    <button class="tab" onclick="filter('メディア掲載',this)">メディア掲載</button>
    <button class="tab" onclick="filter('お知らせ',this)">お知らせ</button>
  </div>

  <div id="news-list"><div class="empty">読み込み中...</div></div>

  <div class="btn-wrap"><button class="btn-primary">お知らせ一覧 ›</button></div>
</div>

<footer>
  あいらぼ＊ — 報告会デモページ（Notion API連携テスト）
</footer>

<script>
let allData = [], currentFilter = 'all';

async function load() {
  setStatus('loading', 'Notionからデータ取得中...');
  try {
    const res = await fetch('/api/news');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    allData = json.results.map(p => ({
      title: p.properties['Name']?.title?.[0]?.plain_text || '（タイトルなし）',
      category: p.properties['Category']?.select?.name || 'お知らせ',
      date: fmtDate(p.properties['Date']?.date?.start),
      url: p.properties['URL']?.url || '',
      notionUrl: p.url
    }));
    setStatus('ok', `✅ ${allData.length}件取得完了 ← Notionを更新して「↺ 再取得」を押すと即反映！`);
    filter(currentFilter);
  } catch (e) {
    setStatus('error', `エラー: ${e.message}`);
  }
}

function filter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  if (btn) btn.classList.add('active');
  else document.querySelectorAll('.tab')[['all','イベント','メディア掲載','お知らせ'].indexOf(f)]?.classList.add('active');
  const list = f === 'all' ? allData : allData.filter(n => n.category === f);
  renderList(list);
}

function renderList(items) {
  const el = document.getElementById('news-list');
  if (!items.length) { el.innerHTML = '<div class="empty">該当するお知らせはありません</div>'; return; }
  el.innerHTML = items.map(item => `
    <a class="news-item" href="${item.url || item.notionUrl || '#'}" target="_blank" rel="noopener">
      <span class="news-date">${item.date}</span>
      <span class="news-cat cat-${item.category}">${item.category}</span>
      <span class="news-title">${item.title}</span>
      <span class="news-arrow">›</span>
    </a>
  `).join('');
}

function setStatus(state, text) {
  document.getElementById('dot').className = 'dot ' + state;
  document.getElementById('status-text').textContent = text;
}

function fmtDate(s) {
  if (!s) return '—';
  return s.slice(0, 10).replace(/-/g, '/');
}

load();
</script>
</body>
</html>
